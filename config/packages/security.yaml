security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UtilisateurInterneProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/api
            provider: app_user_provider
            stateless: false
        main:
            lazy: true
            security: false

    access_control:
        - { path: ^/api/auth/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/deconnexion, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/session, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
        - { path: ^/api/secretaires, roles: ROLE_RESPONSABLE }
        - { path: ^/api/responsables, roles: ROLE_RESPONSABLE }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
