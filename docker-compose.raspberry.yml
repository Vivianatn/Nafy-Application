# Stack Nafy — Raspberry Pi + MariaDB existante (~/docker-compose.yml → vivian-db-1)
# Usage : docker compose -f docker-compose.raspberry.yml --env-file .env.local up -d --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.raspberry
    container_name: nafy-web
    restart: unless-stopped
    ports:
      - "8319:80"
    volumes:
      - .:/var/www/html
    networks:
      - default
      - vivian_db
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-changez_moi_en_production}
      DATABASE_URL: mysql://${DB_USER:-vivian}:${DB_PASSWORD}@db:3306/nafy-application?serverVersion=12.3.2-MariaDB&charset=utf8mb4
      DEFAULT_URI: ${DEFAULT_URI:-http://127.0.0.1:8319}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-'^https?://.*$'}

networks:
  vivian_db:
    external: true
    name: vivian_default
